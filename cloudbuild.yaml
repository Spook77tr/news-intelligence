substitutions:
  _REGION: europe-west1
  _REGISTRY: europe-west1-docker.pkg.dev/${PROJECT_ID}/news-intelligence
  _SA_EMAIL: news-sa@${PROJECT_ID}.iam.gserviceaccount.com

steps:
  # ── Build (all 3 in parallel) ──────────────────────────────────────────────

  - name: gcr.io/cloud-builders/docker
    id: build-fetcher
    waitFor: ["-"]
    args:
      - build
      - -f
      - jobs/fetcher/Dockerfile
      - -t
      - ${_REGISTRY}/news-fetcher:${COMMIT_SHA}
      - -t
      - ${_REGISTRY}/news-fetcher:latest
      - --cache-from
      - ${_REGISTRY}/news-fetcher:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: build-processor
    waitFor: ["-"]
    args:
      - build
      - -f
      - jobs/processor/Dockerfile
      - -t
      - ${_REGISTRY}/news-processor:${COMMIT_SHA}
      - -t
      - ${_REGISTRY}/news-processor:latest
      - --cache-from
      - ${_REGISTRY}/news-processor:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: build-notifier
    waitFor: ["-"]
    args:
      - build
      - -f
      - jobs/notifier/Dockerfile
      - -t
      - ${_REGISTRY}/news-notifier:${COMMIT_SHA}
      - -t
      - ${_REGISTRY}/news-notifier:latest
      - --cache-from
      - ${_REGISTRY}/news-notifier:latest
      - .

  # ── Push (each after its build) ────────────────────────────────────────────

  - name: gcr.io/cloud-builders/docker
    id: push-fetcher
    waitFor: [build-fetcher]
    args:
      - push
      - --all-tags
      - ${_REGISTRY}/news-fetcher

  - name: gcr.io/cloud-builders/docker
    id: push-processor
    waitFor: [build-processor]
    args:
      - push
      - --all-tags
      - ${_REGISTRY}/news-processor

  - name: gcr.io/cloud-builders/docker
    id: push-notifier
    waitFor: [build-notifier]
    args:
      - push
      - --all-tags
      - ${_REGISTRY}/news-notifier

  # ── Deploy Cloud Run Jobs (each after its push) ────────────────────────────

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy-fetcher
    waitFor: [push-fetcher]
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run jobs update news-fetcher \
          --image=${_REGISTRY}/news-fetcher:${COMMIT_SHA} \
          --region=${_REGION} \
          --service-account=${_SA_EMAIL} \
          --set-env-vars="GCP_PROJECT_ID=${PROJECT_ID},BQ_DATASET=news_intelligence" \
          --set-secrets="ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,TELEGRAM_CHAT_ID=TELEGRAM_CHAT_ID:latest" \
          --memory=2Gi \
          --task-timeout=1800 \
          --project=${PROJECT_ID} \
        || \
        gcloud run jobs create news-fetcher \
          --image=${_REGISTRY}/news-fetcher:${COMMIT_SHA} \
          --region=${_REGION} \
          --service-account=${_SA_EMAIL} \
          --set-env-vars="GCP_PROJECT_ID=${PROJECT_ID},BQ_DATASET=news_intelligence" \
          --set-secrets="ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,TELEGRAM_CHAT_ID=TELEGRAM_CHAT_ID:latest" \
          --memory=2Gi \
          --task-timeout=1800 \
          --project=${PROJECT_ID}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy-processor
    waitFor: [push-processor]
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run jobs update news-processor \
          --image=${_REGISTRY}/news-processor:${COMMIT_SHA} \
          --region=${_REGION} \
          --service-account=${_SA_EMAIL} \
          --set-env-vars="GCP_PROJECT_ID=${PROJECT_ID},BQ_DATASET=news_intelligence" \
          --set-secrets="ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,TELEGRAM_CHAT_ID=TELEGRAM_CHAT_ID:latest" \
          --memory=2Gi \
          --task-timeout=1800 \
          --project=${PROJECT_ID} \
        || \
        gcloud run jobs create news-processor \
          --image=${_REGISTRY}/news-processor:${COMMIT_SHA} \
          --region=${_REGION} \
          --service-account=${_SA_EMAIL} \
          --set-env-vars="GCP_PROJECT_ID=${PROJECT_ID},BQ_DATASET=news_intelligence" \
          --set-secrets="ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,TELEGRAM_CHAT_ID=TELEGRAM_CHAT_ID:latest" \
          --memory=2Gi \
          --task-timeout=1800 \
          --project=${PROJECT_ID}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy-notifier
    waitFor: [push-notifier]
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run jobs update news-notifier \
          --image=${_REGISTRY}/news-notifier:${COMMIT_SHA} \
          --region=${_REGION} \
          --service-account=${_SA_EMAIL} \
          --set-env-vars="GCP_PROJECT_ID=${PROJECT_ID},BQ_DATASET=news_intelligence" \
          --set-secrets="ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,TELEGRAM_CHAT_ID=TELEGRAM_CHAT_ID:latest" \
          --memory=2Gi \
          --task-timeout=1800 \
          --project=${PROJECT_ID} \
        || \
        gcloud run jobs create news-notifier \
          --image=${_REGISTRY}/news-notifier:${COMMIT_SHA} \
          --region=${_REGION} \
          --service-account=${_SA_EMAIL} \
          --set-env-vars="GCP_PROJECT_ID=${PROJECT_ID},BQ_DATASET=news_intelligence" \
          --set-secrets="ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,TELEGRAM_CHAT_ID=TELEGRAM_CHAT_ID:latest" \
          --memory=2Gi \
          --task-timeout=1800 \
          --project=${PROJECT_ID}

images:
  - ${_REGISTRY}/news-fetcher:${COMMIT_SHA}
  - ${_REGISTRY}/news-fetcher:latest
  - ${_REGISTRY}/news-processor:${COMMIT_SHA}
  - ${_REGISTRY}/news-processor:latest
  - ${_REGISTRY}/news-notifier:${COMMIT_SHA}
  - ${_REGISTRY}/news-notifier:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
